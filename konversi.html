<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Konversi Satuan</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#03152d,#0d2b57);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:600px;
}

.back{
  display:inline-block;
  margin-bottom:20px;
  text-decoration:none;
  color:#9ecfff;
  font-size:16px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:25px;
  padding:35px;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.title{
  text-align:center;
  font-size:34px;
  margin-bottom:10px;
}

.desc{
  text-align:center;
  color:#b8dfff;
  margin-bottom:30px;
  line-height:1.6;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:10px;
  color:#d9ecff;
}

input, select{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#0a1c38;
  color:white;
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#8eb8e4;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:15px;
  background:#4da3ff;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  background:#2f8fff;
  transform:translateY(-3px);
}

.hasil{
  margin-top:30px;
  background:#07162d;
  border-radius:18px;
  padding:25px;
}

.hasil h2{
  text-align:center;
  margin-bottom:20px;
  color:#8fcaff;
}

.result{
  color:#67ff9f;
  font-size:28px;
  text-align:center;
  font-weight:bold;
}

.penjelasan{
  margin-top:25px;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  line-height:1.8;
  color:#cfe7ff;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:#9ecfff;
  font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<a href="index.html" class="back">
⬅ Kembali
</a>

<div class="card">

<h1 class="title">
📏 Konversi Satuan
</h1>

<p class="desc">
Masukkan nilai beserta satuannya.
</p>

<div class="input-group">

<label>Pilih Jenis Konversi</label>

<select id="jenis">

<option value="cm-meter">
Centimeter → Meter
</option>

<option value="meter-cm">
Meter → Centimeter
</option>

<option value="km-meter">
Kilometer → Meter
</option>

<option value="meter-km">
Meter → Kilometer
</option>

<option value="kg-gram">
Kilogram → Gram
</option>

<option value="gram-kg">
Gram → Kilogram
</option>

<option value="c-f">
Celcius → Fahrenheit
</option>

<option value="f-c">
Fahrenheit → Celcius
</option>

</select>

</div>

<div class="input-group">

<label>Masukkan Nilai</label>

<input
type="text"
id="nilai"
placeholder="Contoh: 100 cm">

</div>

<button onclick="konversi()">
Konversi Sekarang
</button>

<div class="hasil">

<h2>Hasil Konversi</h2>

<div id="hasil" class="result">
-
</div>

<div class="penjelasan" id="penjelasan">

Masukkan angka beserta satuannya terlebih dahulu.

</div>

</div>

<div class="footer">
MSDRkulator © 2026
</div>

</div>

</div>

<script>

// Ubah placeholder otomatis
document.getElementById("jenis")
.addEventListener("change", function(){

  let jenis = this.value;

  let input =
  document.getElementById("nilai");

  if(jenis == "cm-meter"){

    input.placeholder = "Contoh: 100 cm";

  }

  else if(jenis == "meter-cm"){

    input.placeholder = "Contoh: 1 meter";

  }

  else if(jenis == "km-meter"){

    input.placeholder = "Contoh: 2 km";

  }

  else if(jenis == "meter-km"){

    input.placeholder = "Contoh: 500 meter";

  }

  else if(jenis == "kg-gram"){

    input.placeholder = "Contoh: 1 kg";

  }

  else if(jenis == "gram-kg"){

    input.placeholder = "Contoh: 1000 gram";

  }

  else if(jenis == "c-f"){

    input.placeholder = "Contoh: 30 c";

  }

  else if(jenis == "f-c"){

    input.placeholder = "Contoh: 86 f";

  }

});

function konversi(){

  let jenis =
  document.getElementById("jenis").value;

  let input =
  document.getElementById("nilai")
  .value.toLowerCase();

  let angka =
  parseFloat(input);

  if(isNaN(angka)){

    alert("Masukkan angka dengan benar!");

    return;
  }

  let hasil;
  let penjelasan;

  // =====================
  // CM → METER
  // =====================

  if(jenis == "cm-meter"){

    if(!input.includes("cm")){

      alert("Masukkan satuan cm");

      return;
    }

    hasil = angka / 100;

    penjelasan =
    angka + " cm ÷ 100 = " +
    hasil + " meter";

    hasil += " meter";

  }

  // =====================
  // METER → CM
  // =====================

  else if(jenis == "meter-cm"){

    if(!input.includes("meter")){

      alert("Masukkan satuan meter");

      return;
    }

    hasil = angka * 100;

    penjelasan =
    angka + " meter × 100 = " +
    hasil + " cm";

    hasil += " cm";

  }

  // =====================
  // KM → METER
  // =====================

  else if(jenis == "km-meter"){

    if(!input.includes("km")){

      alert("Masukkan satuan km");

      return;
    }

    hasil = angka * 1000;

    penjelasan =
    angka + " km × 1000 = " +
    hasil + " meter";

    hasil += " meter";

  }

  // =====================
  // METER → KM
  // =====================

  else if(jenis == "meter-km"){

    if(!input.includes("meter")){

      alert("Masukkan satuan meter");

      return;
    }

    hasil = angka / 1000;

    penjelasan =
    angka + " meter ÷ 1000 = " +
    hasil + " km";

    hasil += " km";

  }

  // =====================
  // KG → GRAM
  // =====================

  else if(jenis == "kg-gram"){

    if(!input.includes("kg")){

      alert("Masukkan satuan kg");

      return;
    }

    hasil = angka * 1000;

    penjelasan =
    angka + " kg × 1000 = " +
    hasil + " gram";

    hasil += " gram";

  }

  // =====================
  // GRAM → KG
  // =====================

  else if(jenis == "gram-kg"){

    if(!input.includes("gram")){

      alert("Masukkan satuan gram");

      return;
    }

    hasil = angka / 1000;

    penjelasan =
    angka + " gram ÷ 1000 = " +
    hasil + " kg";

    hasil += " kg";

  }

  // =====================
  // CELCIUS → FAHRENHEIT
  // =====================

  else if(jenis == "c-f"){

    if(!input.includes("c")){

      alert("Masukkan satuan c");

      return;
    }

    hasil = (angka * 9/5) + 32;

    penjelasan =
    "(" + angka + " × 9/5) + 32 = " +
    hasil + " °F";

    hasil += " °F";

  }

  // =====================
  // FAHRENHEIT → CELCIUS
  // =====================

  else if(jenis == "f-c"){

    if(!input.includes("f")){

      alert("Masukkan satuan f");

      return;
    }

    hasil = (angka - 32) * 5/9;

    penjelasan =
    "(" + angka + " - 32) × 5/9 = " +
    hasil.toFixed(2) + " °C";

    hasil =
    hasil.toFixed(2) + " °C";

  }

  // =====================

  document.getElementById("hasil").innerHTML =
  hasil;

  document.getElementById("penjelasan").innerHTML =

  "<b>Penjelasan:</b><br><br>" +

  penjelasan;

}

</script>

</body>
</html>
