<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalkulator Diskon</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#03152d,#0d2b57);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.container{
  width:100%;
  max-width:500px;
}

.back{
  display:inline-block;
  margin-bottom:20px;
  text-decoration:none;
  color:#9ecfff;
  font-size:16px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:35px;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.1);
}

.title{
  text-align:center;
  font-size:34px;
  margin-bottom:10px;
}

.desc{
  text-align:center;
  color:#b8dfff;
  margin-bottom:30px;
  line-height:1.6;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:10px;
  color:#d9ecff;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#0a1c38;
  color:white;
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#8eb8e4;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:15px;
  background:#4da3ff;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  background:#2f8fff;
  transform:translateY(-3px);
}

.hasil{
  margin-top:30px;
  background:#07162d;
  border-radius:18px;
  padding:25px;
}

.hasil h2{
  text-align:center;
  margin-bottom:20px;
  color:#8fcaff;
}

.hasil p{
  margin:12px 0;
  font-size:18px;
}

.total{
  color:#67ff9f;
  font-size:24px;
  font-weight:bold;
}

.penjelasan{
  margin-top:25px;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  line-height:1.8;
  color:#cfe7ff;
}

</style>

</head>
<body>

<div class="container">

<a href="index.html" class="back">
⬅ Kembali
</a>

<div class="card">

<h1 class="title">
💸 Kalkulator Diskon
</h1>

<p class="desc">
Hitung potongan harga dan total pembayaran
dengan cepat dan mudah.
</p>

<div class="input-group">

<label>Harga Awal</label>

<input
type="text"
id="harga"
placeholder="Contoh: 50.000">

</div>

<div class="input-group">

<label>Diskon (%)</label>

<input
type="text"
id="diskon"
placeholder="Contoh: 10%">

</div>

<button onclick="hitungDiskon()">
Hitung Diskon
</button>

<div class="hasil">

<h2>Hasil Perhitungan</h2>

<p id="hargaAwal">
Harga Awal : Rp0
</p>

<p id="diskonPersen">
Diskon : 0%
</p>

<p id="potongan">
Potongan Harga : Rp0
</p>

<p id="total" class="total">
Total Bayar : Rp0
</p>

<div class="penjelasan" id="penjelasan">

Masukkan harga dan diskon terlebih dahulu.

</div>

</div>

</div>

</div>

<script>

function hitungDiskon(){

  // Ambil harga lalu hapus titik
  let hargaInput =
  document.getElementById("harga").value;

  let harga =
  parseFloat(hargaInput.replace(/\./g,""));

  // Ambil diskon
  let diskonInput =
  document.getElementById("diskon").value;

  // Validasi %
  if(!diskonInput.includes("%")){

    alert("Diskon harus memakai tanda %");

    return;
  }

  // Ambil angka diskon
  let diskon =
  parseFloat(diskonInput.replace("%",""));

  // Validasi input
  if(isNaN(harga) || isNaN(diskon)){

    alert("Masukkan angka dengan benar!");

    return;
  }

  // Hitung diskon
  let potongan =
  harga * diskon / 100;

  // Hitung total
  let total =
  harga - potongan;

  // Format rupiah
  let formatHarga =
  harga.toLocaleString("id-ID");

  let formatPotongan =
  potongan.toLocaleString("id-ID");

  let formatTotal =
  total.toLocaleString("id-ID");

  // Tampilkan hasil
  document.getElementById("hargaAwal").innerHTML =
  "Harga Awal : Rp" + formatHarga;

  document.getElementById("diskonPersen").innerHTML =
  "Diskon : " + diskon + "%";

  document.getElementById("potongan").innerHTML =
  "Potongan Harga : Rp" + formatPotongan;

  document.getElementById("total").innerHTML =
  "Total Bayar : Rp" + formatTotal;

  // Penjelasan
  document.getElementById("penjelasan").innerHTML =

  "<b>Penjelasan:</b><br><br>" +

  "Potongan harga dihitung menggunakan rumus:<br>" +

  "<b>Harga × Diskon ÷ 100</b><br><br>" +

  "Rp" + formatHarga +

  " × " + diskon + "% ÷ 100 = Rp" +

  formatPotongan +

  "<br><br>" +

  "Kemudian total pembayaran dihitung:<br>" +

  "<b>Harga Awal - Potongan</b><br><br>" +

  "Rp" + formatHarga +

  " - Rp" + formatPotongan +

  " = Rp" + formatTotal;

}

</script>

</body>
</html>
